<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#071a0e" />
    <meta name="description" content="Acompanhe o bolão do 2º turno do Brasileirão Série A 2026" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Bolão Guris" />
    <link rel="manifest" href="/manifest.json" id="pwa-manifest" />
    <script>
      (function () {
        /* Mesma trava de segurança do lerToken() em src/App.jsx: sem "?t="
           na URL atual, só usa o token salvo se esse navegador NUNCA viu mais
           de um token diferente (celular pessoal = sempre 1 só; navegador que
           testa vários links = trava sozinho). Fallback legado: quando não há
           a lista `bolao_tokens_vistos` (instalados antes dela existir), a
           contagem é reconstruída pelas chaves de cache `bolao-<token>`. */
        var t = new URLSearchParams(location.search).get("t");
        if (!t) {
          try {
            var vistosRaw = localStorage.getItem("bolao_tokens_vistos");
            var vistos = vistosRaw ? JSON.parse(vistosRaw) : null;
            if (vistos && vistos.length === 1) {
              t = localStorage.getItem("bolao_token") || "";
            } else {
              var cache = {};
              for (var i = 0; i < localStorage.length; i++) {
                var k = localStorage.key(i);
                if (k && k.slice(0, 6) === "bolao-" && k !== "bolao-tab") cache[k.slice(6)] = 1;
              }
              var ids = Object.keys(cache);
              if (ids.length === 1) t = ids[0];
            }
          } catch (e) {}
        }
        if (t) {
          document.getElementById("pwa-manifest").href =
            "/api/manifest?t=" + encodeURIComponent(t);
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon-512.png" />
    <title>Bolão dos Guris — Brasileirão 2026/2</title>
  </head>
  <body style="margin:0;background:#071a0e">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
