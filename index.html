<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#071a0e" />
    <meta name="description" content="Acompanhe o bolão do 2º turno do Brasileirão Série A 2026" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Bolão Guris" />
    <link rel="manifest" href="/manifest.json" id="pwa-manifest" />
    <script>
      (function () {
        var t = new URLSearchParams(location.search).get("t");
        if (!t) { try { t = localStorage.getItem("bolao_token"); } catch (e) {} }
        if (t) {
          document.getElementById("pwa-manifest").href =
            "/api/manifest?t=" + encodeURIComponent(t);
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon-512.png" />
    <title>Bolão dos Guris — Brasileirão 2026/2</title>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
