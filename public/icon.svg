<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="0%" r="110%">
      <stop offset="0%" stop-color="#1d6b38"/>
      <stop offset="100%" stop-color="#071a0e"/>
    </radialGradient>
    <radialGradient id="ball" cx="37%" cy="30%" r="68%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="50%"  stop-color="#efefef"/>
      <stop offset="100%" stop-color="#b2b2b2"/>
    </radialGradient>
    <clipPath id="clip">
      <circle cx="256" cy="242" r="165"/>
    </clipPath>
  </defs>

  <!-- Fundo verde -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Sombra da bola no chão -->
  <ellipse cx="256" cy="428" rx="118" ry="14" fill="rgba(0,0,0,0.30)"/>

  <!-- Bola - base branca com gradiente 3D -->
  <circle cx="256" cy="242" r="165" fill="url(#ball)"/>

  <!-- Manchas pretas — padrão Telstar clássico -->
  <g clip-path="url(#clip)" fill="#111111">
    <!-- topo -->
    <path d="M256,96 L224,126 L236,163 L276,163 L288,126 Z"/>
    <!-- esquerda cima -->
    <path d="M147,180 L132,220 L165,241 L198,226 L196,187 Z"/>
    <!-- direita cima -->
    <path d="M365,180 L316,187 L314,226 L347,241 L380,220 Z"/>
    <!-- esquerda baixo -->
    <path d="M176,277 L160,315 L195,333 L226,310 L218,273 Z"/>
    <!-- direita baixo -->
    <path d="M336,277 L294,273 L286,310 L317,333 L352,315 Z"/>
    <!-- base -->
    <path d="M256,342 L222,320 L202,352 L256,378 L310,352 L290,320 Z"/>
  </g>

  <!-- Highlight de luz (brilho) -->
  <ellipse cx="204" cy="174" rx="56" ry="36"
    fill="rgba(255,255,255,0.42)"
    transform="rotate(-32,204,174)"
    clip-path="url(#clip)"/>
</svg>
